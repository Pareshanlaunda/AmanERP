# CI: block bad merges. Hostinger prod deploy uses GitHub integration / optional webhook.
name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 003-Hostinger

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Production build
        env:
          # Prefer repo secrets; placeholders keep CI green when secrets unset
          # (most routes are dynamic — Hostinger injects real env at deploy).
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          export NEXT_PUBLIC_SUPABASE_URL="${NEXT_PUBLIC_SUPABASE_URL:-https://placeholder.supabase.co}"
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="${NEXT_PUBLIC_SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.e30.placeholder}"
          npm run build

  # After CI green on the deploy branch: optional Hostinger webhook.
  # If HOSTINGER_WEBHOOK_URL is unset, Hostinger's native GitHub auto-deploy
  # (hPanel → connected repo) still deploys this push.
  deploy-hostinger:
    name: Deploy Hostinger
    needs: build
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/003-Hostinger')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Hostinger redeploy
        env:
          HOSTINGER_WEBHOOK_URL: ${{ secrets.HOSTINGER_WEBHOOK_URL }}
        run: |
          if [ -z "$HOSTINGER_WEBHOOK_URL" ]; then
            echo "HOSTINGER_WEBHOOK_URL not set."
            echo "Relying on Hostinger GitHub Auto-deployment for this branch."
            exit 0
          fi
          echo "POST Hostinger webhook..."
          code=$(curl -sS -o /tmp/hostinger-body -w "%{http_code}" -X POST "$HOSTINGER_WEBHOOK_URL")
          echo "HTTP status: $code"
          cat /tmp/hostinger-body || true
          case "$code" in
            200|201|202|204) echo "Hostinger deploy triggered." ;;
            *) echo "Webhook failed"; exit 1 ;;
          esac
